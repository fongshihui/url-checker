<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>URL Checker</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <p class="eyebrow">Parallel HTTP checks</p>
      <h1>URL Checker</h1>
      <p class="lede">Paste a list of URLs, tune the worker pool, and inspect live results from the Go API.</p>
    </header>

    <main class="layout">
      <section class="panel form-panel">
        <form id="check-form">
          <label class="field">
            <span>URLs</span>
            <textarea id="urls" name="urls" rows="10" placeholder="https://example.com&#10;golang.org&#10;https://httpbin.org/status/503" required></textarea>
          </label>

          <div class="grid">
            <label class="field">
              <span>Workers</span>
              <input id="workers" name="workers" type="number" min="1" value="4">
            </label>

            <label class="field">
              <span>Timeout (ms)</span>
              <input id="timeout_ms" name="timeout_ms" type="number" min="1" value="5000">
            </label>

            <label class="field">
              <span>Retries</span>
              <input id="retries" name="retries" type="number" min="0" value="1">
            </label>
          </div>

          <div class="actions">
            <button id="submit" type="submit">Run Check</button>
            <button id="fill-demo" type="button" class="secondary">Load Demo</button>
          </div>
        </form>
      </section>

      <section class="panel results-panel">
        <div class="status-row">
          <div>
            <p class="eyebrow">Results</p>
            <h2>Batch Summary</h2>
          </div>
          <div id="request-state" class="request-state idle">Idle</div>
        </div>

        <div id="summary" class="summary empty">
          <article>
            <span>OK</span>
            <strong>0</strong>
          </article>
          <article>
            <span>Fail</span>
            <strong>0</strong>
          </article>
          <article>
            <span>Total</span>
            <strong>0</strong>
          </article>
        </div>

        <p id="message" class="message">No request yet.</p>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>URL</th>
                <th>Status</th>
                <th>Attempts</th>
                <th>Duration</th>
                <th>Outcome</th>
              </tr>
            </thead>
            <tbody id="results-body">
              <tr class="placeholder">
                <td colspan="5">Run a batch to populate results.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="/static/app.js" defer></script>
</body>
</html>
